name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-selftest:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build release app
        run: swift build -c release

      - name: Run zero-dependency selftests
        run: swift run -c release safari-gestures-selftest

      - name: Package and verify app bundle
        run: bash scripts/make-app.sh
